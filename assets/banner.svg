<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="30%" style="stop-color:#1a0a2e"/>
      <stop offset="55%" style="stop-color:#2d1b4e"/>
      <stop offset="75%" style="stop-color:#6b2d5c"/>
      <stop offset="90%" style="stop-color:#c94b6b"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#ff6b6b;stop-opacity:0.7"/>
      <stop offset="70%" style="stop-color:#ff1493;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff1493;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.1"/>
      <stop offset="85%" style="stop-color:#ff00ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="gridGradCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="70%" style="stop-color:#00f0ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes gridPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.85; }
      }
      .grid-animated {
        animation: gridPulse 4s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background gradient -->
  <rect width="1280" height="320" fill="url(#sky)"/>

  <!-- Sun - prominent circular -->
  <ellipse cx="640" cy="320" rx="320" ry="120" fill="url(#sun)"/>
  <circle cx="640" cy="300" r="60" fill="#ffaa00" opacity="0.9"/>
  <circle cx="640" cy="300" r="45" fill="#fff5cc" opacity="0.6"/>

  <!-- Horizon line - bright magenta -->
  <line x1="0" y1="260" x2="1280" y2="260" stroke="#ff1493" stroke-width="3" opacity="0.9"/>

  <!-- Perspective grid - neon magenta, bolder -->
  <g class="grid-animated" fill="none" stroke="url(#gridGrad)" stroke-width="1.5">
    <path d="M0 320 L640 180 L1280 320" stroke-opacity="0.6"/>
    <path d="M0 320 L640 150 L1280 320" stroke-opacity="0.5"/>
    <path d="M0 320 L640 120 L1280 320" stroke-opacity="0.4"/>
    <path d="M0 320 L640 90 L1280 320" stroke-opacity="0.3"/>
    <line x1="0" y1="320" x2="640" y2="200" stroke-opacity="0.5"/>
    <line x1="1280" y1="320" x2="640" y2="200" stroke-opacity="0.5"/>
    <line x1="160" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
    <line x1="320" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
    <line x1="480" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
    <line x1="800" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
    <line x1="960" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
    <line x1="1120" y1="320" x2="640" y2="220" stroke-opacity="0.45"/>
  </g>

  <!-- Cyan accent grid lines -->
  <g fill="none" stroke="url(#gridGradCyan)" stroke-width="0.8" opacity="0.7">
    <path d="M0 320 L640 200 L1280 320" stroke-opacity="0.4"/>
    <line x1="320" y1="320" x2="640" y2="240" stroke-opacity="0.3"/>
    <line x1="960" y1="320" x2="640" y2="240" stroke-opacity="0.3"/>
  </g>

  <!-- Main title: Pablo Montes - system fonts only -->
  <text x="640" y="95" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" fill="#ffffff" filter="url(#glow)" letter-spacing="6">PABLO MONTES</text>

  <!-- Subtitle: AI Engineer -->
  <text x="640" y="140" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="22" font-weight="700" fill="#00f0ff" filter="url(#glow)" letter-spacing="8">AI ENGINEER</text>

  <!-- Tagline - fixed middle dot -->
  <text x="640" y="175" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="16" font-weight="500" fill="rgba(255,255,255,0.95)" letter-spacing="2">building production AI agents · making LLMs reliable at scale</text>
</svg>
